### Site Settings ###
title               : Ayush Mazumdar                     # CHANGED: was "portfolYOU"
description         : >-
                      Electrical Engineering student building          
                      FPGA, embedded, and signal processing projects.   
baseurl             : ""                                 # CHANGED: empty quotes since you're hosting at <username>.github.io directly
repository          : ayush-mazumdar/ayush-mazumdar.github.io   # CHANGED: was yousinix/portfolYOU — needed for remote project auto-import to work
remote_theme        : yousinix/portfolYOU
open_new_tab        : false                    # Opens external URLs in new tab (works for posts, projects and navbar only)


### Plugins ###
plugins:
  - jemoji


### Navbar Settings ###
nav_exclude:                                            # The following paths are excluded from navbar
  - pages/tags.html
  - pages/404.html
  - pages/index.md
# - documentation/partials/**                           # COMMENTED OUT: documentation-only, not part of your site


### Author Info ###
author:
  name              : Ayush Mazumdar                    # CHANGED: was "John Doe"
  image             : /assets/img/profile.jpg            # CHANGED: point this at your own headshot once uploaded to assets/img/
# behance           : your_username                      # COMMENTED OUT: not used — uncomment and fill in if you want a Behance link
# dribbble          : your_username
  email             : ayush.mazumdar@ucalgary.ca          # CHANGED: was "username@domain.com"
# facebook          : your_username                      # COMMENTED OUT: not used
  github            : ayush-mazumdar                      # CHANGED: was "your_username"
# gitlab            : your_username
# instagram         : your_username
# kaggle            : your_username
  linkedin          : ayushmazumdar                       # CHANGED: was "your_username" — this should match the part after linkedin.com/in/
# medium            : your_username                       # COMMENTED OUT: not used
# soundcloud        : your_username
# spotify           : your_username
# stackoverflow     : your_user_id
# tumblr            : your_username.tumblr.com
# twitch            : your_username
# twitter           : your_username                       # COMMENTED OUT: not used — uncomment and fill in if you want a Twitter/X link
# vimeo             : your_username
# youtube           : your_channel_name
# keybase           : your_username


### Posts ###
permalink: /blog/:title


### Collections ###
collections:
  projects:
    output: true
    permalink: /projects/:name
# elements:                                             # COMMENTED OUT: documentation-only collection, not needed on your site
#   output: true


### Disqus ###
disqus:
  shortname: your-short-name-disqus                     # NOTE: leave as-is unless you set up Disqus comments on blog posts — not needed for a project portfolio


### Analytics ###
analytics:
  enabled: false                                        # NOTE: set true + add your Google Analytics tracking ID below if you want visitor analytics
  google:
    tracking_id: your-google-tracking-id


### Buy me a coffee ###
# See https://www.buymeacoffee.com/
buymeacoffee:
  enabled: false                                         # NOTE: leave false — not relevant for an internship portfolio
  username: your_username
  color: "#007bff"
  message: "Thank you for visiting."                    # Message to be displayed aside from the button for a few seconds.
  description: "Support me on Buy me a coffee!"


### Defaults for collections ###
defaults:
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "page"
# - scope:                                              # COMMENTED OUT: documentation-only, not needed on your site
#     path: ""
#     type: "elements"
#   values:
#     layout: "element"
  - scope:
      path: ""
      type: "posts"
    values:
      comments: false                                   # Set to true to enable disqus comments


### Exclude from processing ###
exclude:
  - README.md
  - CONTRIBUTING.md
  - LICENSE
  - "*.log"
